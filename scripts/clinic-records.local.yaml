# Local-acceptance variant of ../datastore/clinic-records.yaml — for
# exercising the seed script and the clinic constraints against a local
# stigmer-server (`stigmer server` / OSS edition). NOT the production
# manifest; the differences, and why they exist:
#
#   - metadata.org is `stigmer`: the OSS record RPCs resolve slugs
#     against the local single-tenant org only.
#   - The authorization block binds the OSS fixed local principal
#     (identity_account/system — every local caller) to `admin`, so the
#     seed script holds the insert grant on `schedules`. The production
#     manifest instead binds the doctor's WhatsApp number and keeps
#     operators out of the manifest entirely (the production schedule is
#     onboarded conversationally by the doctor).
#
# Everything else — collections, fields, constraints, grants — is
# byte-identical with the production manifest, so what this file proves
# is what production enforces.
apiVersion: agentic.stigmer.ai/v1
kind: Datastore
metadata:
  name: clinic-records
  org: stigmer
spec:
  description: >
    Appointment records for the clinic assistant: the weekly schedule,
    date-specific exceptions, and patient bookings.
  timezone: Asia/Kolkata
  authorization:
    roles:
      - name: admin
      - name: patient
    bindings:
      # The OSS fixed local principal — every caller on a local server.
      - subject:
          principal:
            kind: identity_account
            id: system
        role: admin
    default_role: patient

  collections:
    # ── Weekly recurring sessions (a day can have several) ─────────────
    - name: schedules
      description: Weekly recurring clinic sessions, e.g. Mon 10:00-13:00.
      fields:
        - name: day_of_week
          type: integer
          required: true
          description: 0=Sunday through 6=Saturday.
        - name: session_start
          type: time
          required: true
        - name: session_end
          type: time
          required: true
      checks:
        - name: valid_weekday
          expression: "this.day_of_week >= 0 && this.day_of_week <= 6"
          message: "day_of_week must be 0 (Sunday) through 6 (Saturday)"
        - name: start_before_end
          expression: "this.session_start < this.session_end"
          message: "a session must start before it ends"
      uniques:
        - name: one_session_per_start
          fields: [day_of_week, session_start]
          message: "that day already has a session starting at that time"
      grants:
        - role: patient
          verbs: [read]
        - role: admin
          verbs: [read, insert, update, delete]

    # ── Date-specific overrides (day off, vacation, partial closure) ───
    - name: schedule_exceptions
      description: Date-specific schedule overrides — a full day off or a partial closure window.
      fields:
        - name: exception_date
          type: date
          required: true
        - name: closed_all_day
          type: bool
          required: true
          default: true
        - name: closed_start
          type: time
        - name: closed_end
          type: time
        - name: reason
          type: string
      checks:
        - name: window_consistent
          expression: >-
            (this.closed_all_day && this.closed_start == null
              && this.closed_end == null)
            || (!this.closed_all_day && this.closed_start != null
              && this.closed_end != null
              && this.closed_start < this.closed_end)
          message: "a partial closure needs a start and end time; an all-day closure must not set them"
      uniques:
        - name: one_exception_per_date
          fields: [exception_date]
          message: "that date already has an exception; update it instead"
      grants:
        - role: patient
          verbs: [read]
        - role: admin
          verbs: [read, insert, update, delete]

    # ── Bookings ────────────────────────────────────────────────────────
    - name: bookings
      description: Patient appointments. Attribution (who booked) is the server-stamped created_by, never a typed-in value.
      fields:
        - name: slot_start
          type: timestamp
          required: true
        - name: patient_name
          type: string
          required: true
        - name: patient_phone
          type: string
        - name: status
          type: string
          required: true
          default: confirmed
          enum_values: [confirmed, cancelled]
      uniques:
        - name: one_confirmed_per_slot
          fields: [slot_start]
          where: { field: status, equals: confirmed }
          message: "that slot is already booked"
      checks:
        - name: half_hour_grid
          expression: >-
            this.slot_start.getMinutes(tz) in [0, 30]
            && this.slot_start.getSeconds() == 0
          message: "appointments start on the hour or half hour"
      exists:
        - name: inside_clinic_hours
          when: "this.status == 'confirmed'"
          collection: schedules
          where: >-
            that.day_of_week == this.slot_start.getDayOfWeek(tz)
            && timeOfDay(this.slot_start, tz) >= that.session_start
            && timeOfDay(this.slot_start, tz) < that.session_end
          message: "that time is outside clinic hours"
      not_exists:
        - name: not_on_closed_date
          when: "this.status == 'confirmed'"
          collection: schedule_exceptions
          where: >-
            that.exception_date == localDate(this.slot_start, tz)
            && (that.closed_all_day
                || (timeOfDay(this.slot_start, tz) >= that.closed_start
                    && timeOfDay(this.slot_start, tz) < that.closed_end))
          message: "the clinic is closed at that time"
      grants:
        # Mirrors the production manifest: patient reads are
        # field-scoped to slot occupancy (store-enforced
        # confidentiality, dont-dos/002).
        - role: patient
          verbs: [read, insert]
          read_fields: [slot_start, status]
        - role: patient
          verbs: [update, delete]
          scope: own
        - role: admin
          verbs: [read, insert, update, delete]
