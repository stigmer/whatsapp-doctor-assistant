# The clinic's PRIVATE admin WhatsApp number -> the doctor assistant.
#
# Share this number only with the doctor/clinic staff. During the pilot a
# Meta test number works here. Apply with `stigmer apply -f`, then complete
# the number verification through the console's connect flow.
#
# Fill every placeholder per docs/connect-whatsapp-runbook.md ("Values to
# collect" table), then follow Parts 5-6 of the runbook to apply and connect.
apiVersion: agentic.stigmer.ai/v1
kind: AgentChannel
metadata:
  name: clinic-doctor-whatsapp
  org: your-org # <- your Stigmer org slug (same value in every org field below)
spec:
  agent_ref:
    kind: agent
    org: your-org
    slug: clinic-doctor-assistant
  enabled: true
  whatsapp:
    # Meta app -> API Setup: the numeric ID next to the ADMIN number (or the
    # test number during the pilot), NOT the phone number itself. Runbook Part 2.
    phone_number_id: "<ADMIN_NUMBER_PHONE_NUMBER_ID>"
  app_ref:
    kind: channel_app
    org: your-org
    slug: <your-meta-channel-app> # Stigmer console -> Settings -> Channel Apps (runbook Part 3)
  environment_refs:
    # doctor_role credentials ONLY — never bind clinic-patient-db here;
    # the Environment is the privilege boundary.
    - kind: environment
      org: your-org
      slug: clinic-doctor-db
