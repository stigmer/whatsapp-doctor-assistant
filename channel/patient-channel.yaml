# The clinic's PUBLIC WhatsApp number -> the patient assistant.
#
# The number is the role boundary: Meta verifies who is texting, the number
# selects this channel, and this channel serves only the patient agent with
# only patient_role credentials. Apply with `stigmer apply -f`, then complete
# the number verification through the console's connect flow.
apiVersion: agentic.stigmer.ai/v1
kind: AgentChannel
metadata:
  name: clinic-patient-whatsapp
  org: your-org # <- your Stigmer org slug
spec:
  agent_ref:
    kind: agent
    org: your-org
    slug: clinic-patient-assistant
  enabled: true
  whatsapp:
    phone_number_id: "<PUBLIC_NUMBER_PHONE_NUMBER_ID>" # Meta app -> API Setup
  app_ref:
    kind: channel_app
    org: your-org
    slug: <your-meta-channel-app> # Settings -> Channel Apps
  environment_refs:
    - kind: environment
      org: your-org
      slug: clinic-patient-db
