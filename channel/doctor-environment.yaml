# Credentials for the DOCTOR agent's tools: a Postgres connection URL for the
# doctor_role created by schema/clinic.sql (schedule read/write, bookings
# read/cancel). Bound ONLY to the private admin number's channel.
#
# Set visibility to Organization in the console after applying: a private
# Environment cannot serve WhatsApp users.
apiVersion: agentic.stigmer.ai/v1
kind: Environment
metadata:
  name: clinic-doctor-db
  org: your-org # <- your Stigmer org slug
spec:
  description: "Clinic records access for the doctor assistant (doctor_role: manage schedule, read/cancel bookings)"
  data:
    POSTGRES_CONNECTION_URL:
      value: "postgresql://doctor_role:CHANGE_ME_DOCTOR@<project-pooler-host>:5432/postgres"
      is_secret: true
      description: "Supabase Postgres connection URL for doctor_role"
